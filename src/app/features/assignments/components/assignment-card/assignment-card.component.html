<div
  (click)="cardClick.emit(task)"
  (keydown.enter)="cardClick.emit(task)"
  tabindex="0"
  role="button"
  class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-all cursor-pointer relative overflow-hidden group h-full flex flex-col outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
>
  <div
    class="absolute left-0 top-0 bottom-0 w-1"
    [ngClass]="
      task.isCompleted ? 'bg-green-500' : task.isImportant ? 'bg-yellow-400' : 'bg-blue-500'
    "
  ></div>

  <div class="flex justify-between items-start mb-2">
    <div class="flex items-center gap-3">
      <button
        (click)="onToggle($event)"
        class="w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center transition-all duration-300"
        [ngClass]="
          task.isCompleted
            ? 'bg-green-500 border-green-500'
            : 'border-gray-300 hover:border-green-400 bg-white'
        "
      >
        @if (task.isCompleted) {
          <span class="text-white text-sm font-bold leading-none">✓</span>
        }
      </button>

      <h3
        class="text-lg font-semibold line-clamp-1 pr-2 transition-colors duration-300"
        [class.line-through]="task.isCompleted"
        [class.text-gray-400]="task.isCompleted"
        [class.text-gray-800]="!task.isCompleted"
      >
        <span
          class="transition-colors duration-300 ease-in-out text-lg"
          [ngClass]="{
            'text-gray-400 line-through': task.isCompleted,
            'text-gray-900': !task.isCompleted,
          }"
        >
          {{ task.title }}
        </span>
      </h3>
    </div>

    @if (task.isImportant) {
      <span class="text-yellow-400 text-lg leading-none shrink-0">★</span>
    }
  </div>

  <p class="text-gray-500 mb-4 line-clamp-2 text-sm flex-1">{{ task.description }}</p>

  <div class="flex justify-between items-center text-xs mt-auto pt-2 border-t border-gray-50">
    <span class="font-medium text-gray-400 flex items-center gap-1">
      <ng-icon name="matLockClock" class="text-xl"></ng-icon>
      {{ task.dueDate | date: 'dd.MM.yyyy HH:mm' }}
    </span>

    @if (task.totalSteps > 0) {
      <span
        class="font-medium px-2 py-1 rounded-md"
        [ngClass]="
          task.completedSteps === task.totalSteps
            ? 'bg-green-50 text-green-600'
            : 'bg-blue-50 text-blue-600'
        "
      >
        <ng-icon name="matCheck" class="text-xl"></ng-icon> {{ task.completedSteps }} /
        {{ task.totalSteps }}
      </span>
    }
  </div>
</div>
