<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Вхід у систему</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input
          type="email"
          formControlName="email"
          [ngClass]="{'border-red-500': f['email'].invalid && f['email'].touched}"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition-colors"
          placeholder="user@gmail.com"
        />
        @if (f['email'].invalid && f['email'].touched) {
          <div class="text-red-500 text-xs mt-1">Будь ласка, введіть коректний email.</div>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Пароль</label>
        <input
          type="password"
          formControlName="password"
          [ngClass]="{'border-red-500': f['password'].invalid && f['password'].touched}"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 transition-colors"
          placeholder="••••••••"
        />
        @if (f['password'].invalid && f['password'].touched) {
          <div class="text-red-500 text-xs mt-1">Пароль є обов'язковим.</div>
        }
      </div>

      @if (errorMessage()) {
        <div class="text-red-500 text-sm text-center font-medium bg-red-50 p-2 rounded">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        [disabled]="isLoading()"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        {{ isLoading() ? 'Вхід...' : 'Увійти' }}
      </button>

      <p class="mt-2 text-center text-sm text-gray-600">
        Немає акаунту?
        <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">Зареєструватися</a>
      </p>
    </form>

    <div class="mt-6">
      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">Або увійдіть через</span>
        </div>
      </div>

      <div class="mt-6 flex justify-center">
        <asl-google-signin-button type="standard" size="large" text="signin_with" shape="rectangular"></asl-google-signin-button>
      </div>
    </div>
  </div>
</div>
