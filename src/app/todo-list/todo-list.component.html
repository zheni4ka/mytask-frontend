<div class="flex h-screen bg-gray-50 overflow-hidden">
  
  <app-sidebar 
    [categories]="categories" 
    [selectedCategoryId]="selectedCategoryId"
    (categorySelect)="onCategorySelect($event)">
  </app-sidebar>

  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
    
    <app-header 
      [selectedCategoryId]="selectedCategoryId"
      [searchTerm]="searchTerm"
      [sortBy]="sortBy"
      [sortDescending]="sortDescending"
      (filterChange)="onFilterChange($event)"
      (newTask)="openNewTaskModal()"
      (logout)="onLogout()">
    </app-header>

    <div class="flex-1 overflow-y-auto p-6">
      
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          @for (task of tasks; track task.id) {
            <div (click)="openTask(task)" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-all cursor-pointer relative overflow-hidden group">
              <div class="absolute left-0 top-0 bottom-0 w-1" [ngClass]="task.isCompleted ? 'bg-green-500' : 'bg-blue-500'"></div>
              <h3 class="text-lg font-semibold text-gray-800 mb-2">{{ task.title }}</h3>
              <p class="text-gray-500 mb-4 line-clamp-2 text-sm">{{ task.description }}</p>
              <div class="flex justify-between items-center text-xs text-gray-400">
                <span class="font-medium px-2 py-1 bg-gray-50 rounded-md">🕒 {{ task.dueDate | date:'dd.MM.yyyy HH:mm' }}</span>
              </div>
            </div>
          } @empty {
            <div class="col-span-full flex flex-col items-center justify-center p-16 text-center bg-white rounded-2xl border border-dashed border-gray-300">
              <h3 class="text-lg font-medium text-gray-900 mb-1">Завдань не знайдено</h3>
            </div>
          }
        </div>
    </div>
  </main>

  @if (selectedTask) {
  <app-assignment-modal
    [task]="selectedTask"
    [categories]="categories"
    [taskSteps]="taskSteps"
    
    (closeModal)="selectedTask = null"
    (saveTask)="saveTask()"
    (deleteTask)="deleteTask()"
    (addStep)="onAddStep($event)"
    (toggleStep)="onToggleStep($event)">
  </app-assignment-modal>
}
</div>
