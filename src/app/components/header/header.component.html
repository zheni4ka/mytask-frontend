<header
  class="bg-white border-b border-gray-200 p-6 flex items-center justify-between gap-4 shadow-sm z-10"
>
  <h2 class="text-2xl font-bold text-gray-800 mb-6">
    {{ selectedCategoryId ? 'Завдання категорії' : 'Всі завдання' }}
  </h2>

  <div class="flex items-center gap-3">
    <div class="relative w-64 flex flex-row items-center">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (keyup.enter)="onFilterChange()"
        placeholder="Пошук..."
        class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
      />
      <span class="absolute top-2 left-2 text-gray-400 text-xl"><ng-icon name="matSearch" /></span>
    </div>

    <select
      [(ngModel)]="sortBy"
      (change)="onFilterChange()"
      class="bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
    >
      <option value="duedate">За дедлайном</option>
      <option value="title">За назвою</option>
      <option value="description">За описом</option>
    </select>

    <button
      (click)="toggleSort()"
      class="p-2 border border-gray-200 bg-gray-50 rounded-lg hover:bg-gray-100"
      title="Змінити напрямок"
    >
      <span class="flex items-center text-gray-500 text-lg">
        <ng-icon [name]="sortDescending ? 'matKeyboardArrowUp' : 'matKeyboardArrowDown'"></ng-icon>
      </span>
    </button>

    <button
      (click)="newTask.emit()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium transition-colors whitespace-nowrap"
    >
      +
    </button>

    <button
      (click)="logout.emit()"
      class="text-gray-500 hover:text-red-600 px-3 py-2 font-medium transition-colors"
    >
      Вийти
    </button>
  </div>
</header>
