<aside class="w-64 bg-white border-r border-gray-200 flex flex-col h-full">
  <div class="flex flex-row items-center justify-center p-4 border-b border-gray-200">
    <ng-icon class="text-xl" name="heroPencilSquareSolid" />
    <h2 class="text-xl font-bold text-gray-800">MyTask</h2>
  </div>
  <div class="p-4 flex-1 overflow-y-auto">
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Категорії</h3>
    <ul class="space-y-1">
      <li>
        <a
          (click)="onSelect(null, false)"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
          [ngClass]="
            selectedCategoryId === null && !isImportantSelected
              ? 'bg-blue-50 text-blue-700'
              : 'text-gray-700 hover:bg-gray-100'
          "
        >
          <span class="text-xl">📋</span>
          Всі завдання
        </a>
      </li>

      <li>
        <a
          (click)="onSelect(null, true)"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors"
          [ngClass]="
            isImportantSelected ? 'bg-yellow-50 text-yellow-700' : 'text-gray-700 hover:bg-gray-100'
          "
        >
          <span class="text-xl text-yellow-500">★</span>
          Важливі
        </a>
      </li>

      @for (category of categories; track category.id) {
        <li>
          <button
            (click)="onSelect(category.id, false)"
            [class.bg-blue-50]="selectedCategoryId === category.id"
            [class.text-blue-600]="selectedCategoryId === category.id"
            class="w-full text-left px-3 py-2 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-100 transition-colors"
          >
            {{ category.name }}
          </button>
        </li>
      }
    </ul>
  </div>
</aside>
